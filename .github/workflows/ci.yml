name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Skip the `prepare` script (which does `npm install --prefix web && npm run build:web`)
      # so each sub-step's output is visible. Then run them explicitly below.
      - run: npm ci --ignore-scripts

      - run: node scripts/fix-node-pty-perms.js
        if: matrix.os != 'windows-latest'

      - run: npm install --prefix web

      - run: npm run build:web

      - run: npm test
